<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AKTIVITY — Admin Console</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyA61SXnSJpWeULnFjw1plQq6xY88dy318A",
  authDomain: "e-commerce-9dd43.firebaseapp.com",
  projectId: "e-commerce-9dd43",
  storageBucket: "e-commerce-9dd43.firebasestorage.app",
  messagingSenderId: "244726336780",
  appId: "1:244726336780:web:6fb74d7eec213cf6c60d29"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

window._admin = { auth, db, storage, collection, doc, addDoc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp, increment, ref, uploadBytes, getDownloadURL, deleteObject, signInWithEmailAndPassword, signOut };

// ========== AUTH GUARD ==========
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    showLoginScreen();
    return;
  }
  const snap = await getDoc(doc(db, "users", user.uid));
  const userData = snap.exists() ? snap.data() : {};
  if (userData.role !== 'admin') {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#080808;color:#fff;flex-direction:column;gap:16px;font-family:Inter,sans-serif"><div style="font-size:64px">⛔</div><div style="font-size:24px;font-weight:700">Access Denied</div><div>Admin privileges required</div><button onclick="window.location.href='index.html'" style="background:#c8ff00;border:none;padding:10px 24px;border-radius:5px;color:#000;font-weight:600;margin-top:16px;cursor:pointer">Back to Store</button></div>`;
    return;
  }
  window.ADMIN_USER = { uid: user.uid, ...userData };
  document.getElementById('login-overlay')?.remove();
  initAdmin();
});

function showLoginScreen() {
  document.body.innerHTML = `
    <div id="login-overlay" style="position:fixed;inset:0;background:#080808;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif">
      <div style="background:#111;border:1px solid #252525;border-radius:5px;padding:40px;width:360px;max-width:90%">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:38px;text-align:center;margin-bottom:8px;color:#fff">AKT<span style="color:#c8ff00">I</span>VITY</div>
        <div style="text-align:center;font-size:11px;color:#666;margin-bottom:28px;letter-spacing:2px">ADMIN CONSOLE</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <input type="email" id="admin-email" placeholder="admin@aktivity.ng" style="background:#1a1a1a;border:1px solid #252525;border-radius:5px;padding:12px;color:#fff;font-size:13px">
          <input type="password" id="admin-password" placeholder="password" style="background:#1a1a1a;border:1px solid #252525;border-radius:5px;padding:12px;color:#fff;font-size:13px">
          <button id="admin-login-btn" style="background:#c8ff00;color:#000;border:none;border-radius:5px;padding:12px;font-weight:700;cursor:pointer;margin-top:8px">Sign In →</button>
        </div>
      </div>
    </div>`;
  document.getElementById('admin-login-btn').onclick = async () => {
    const email = document.getElementById('admin-email').value.trim();
    const pass = document.getElementById('admin-password').value;
    if (!email || !pass) { alert('Enter credentials'); return; }
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) { alert('Login failed: ' + e.message); }
  };
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#efefef;font-family:'Inter',sans-serif;font-size:13px;overflow-x:hidden}
:root{--void:#080808;--carbon:#111;--graph:#1a1a1a;--border:#252525;--bone:#efefef;--muted:#666;--lime:#c8ff00;--limed:rgba(200,255,0,.07);--red:#ff3b3b;--orange:#ffa300;--blue:#0096ff}
.lime{color:#c8ff00}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.05em}
.bg-lime{background:#c8ff00;color:#000}
.bg-red{background:#ff3b3b;color:#fff}
.bg-graph{background:#1a1a1a;border:1px solid #252525}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:5px;font-weight:600;font-size:12px;cursor:pointer;transition:.2s;border:none}
.btn-lime{background:#c8ff00;color:#000}
.btn-lime:hover{background:#d4ff26;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid #252525;color:#efefef}
.btn-outline:hover{border-color:#c8ff00;color:#c8ff00}
.btn-red{background:#ff3b3b;color:#fff}
.btn-red:hover{background:#ff5252}
.btn-dark{background:#1a1a1a;border:1px solid #252525;color:#efefef}
input,select,textarea{background:#1a1a1a;border:1px solid #252525;border-radius:5px;padding:10px 12px;color:#efefef;font-size:12px;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#c8ff00}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.flex{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.w-100{width:100%}
.mt-3{margin-top:16px}
.mb-3{margin-bottom:16px}
.p-3{padding:20px}
/* ADMIN LAYOUT */
.admin-wrap{display:flex;min-height:100vh}
.sidebar{width:260px;background:#0c0c0c;border-right:1px solid #252525;padding:24px 16px;position:fixed;top:0;left:0;bottom:0;overflow-y:auto}
.main{flex:1;margin-left:260px;padding:24px 32px}
.side-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;margin-bottom:32px;color:#fff;text-align:center}
.side-logo span{color:#c8ff00}
.side-item{padding:10px 14px;border-radius:5px;margin-bottom:4px;cursor:pointer;color:#666;transition:.2s;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:500}
.side-item:hover{background:#1a1a1a;color:#fff}
.side-item.active{background:rgba(200,255,0,.08);color:#c8ff00;border-left:2px solid #c8ff00}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid #252525}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.02em}
.card{background:#0c0c0c;border:1px solid #252525;border-radius:8px;margin-bottom:20px;overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid #252525;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;background:#080808}
.card-title{font-weight:700;font-size:14px}
.table-responsive{overflow-x:auto}
.admin-table{width:100%;border-collapse:collapse;min-width:700px}
.admin-table th{text-align:left;padding:14px 16px;background:#080808;border-bottom:1px solid #252525;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#666}
.admin-table td{padding:12px 16px;border-bottom:1px solid rgba(37,37,37,.5);font-size:12px}
.admin-table tr:hover td{background:rgba(26,26,26,.4)}
.status{font-size:9px;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-block}
.status-processing{background:rgba(255,163,0,.15);color:#ffa300}
.status-shipped{background:rgba(0,150,255,.15);color:#0096ff}
.status-delivered{background:rgba(200,255,0,.12);color:#c8ff00}
.status-cancelled{background:rgba(255,59,59,.12);color:#ff3b3b}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);z-index:9999;display:none;align-items:center;justify-content:center}
.modal-content{background:#0c0c0c;border:1px solid #252525;border-radius:12px;width:90%;max-width:650px;max-height:85vh;overflow-y:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid #252525;display:flex;justify-content:space-between}
.modal-body{padding:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.kpi-card{background:#0c0c0c;border:1px solid #252525;border-radius:8px;padding:18px}
.kpi-value{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:#c8ff00}
.kpi-label{font-size:11px;color:#666;margin-top:6px}
.toast-fixed{position:fixed;bottom:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:6px}
.toast{background:#1a1a1a;border-left:3px solid #c8ff00;padding:10px 16px;border-radius:5px;font-size:11px;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){.sidebar{width:100%;position:relative;height:auto}.main{margin-left:0}.admin-wrap{flex-direction:column}}
</style>
</head>
<body>

<div class="admin-wrap" style="display:none" id="admin-app">
  <div class="sidebar">
    <div class="side-logo">AKT<span>I</span>VITY<br><span style="font-size:10px;letter-spacing:2px">ADMIN</span></div>
    <div class="side-item" data-tab="dashboard">📊 Dashboard</div>
    <div class="side-item" data-tab="products">👕 Products</div>
    <div class="side-item" data-tab="orders">📦 Orders</div>
    <div class="side-item" data-tab="customers">👥 Customers</div>
    <div class="side-item" data-tab="notifications">🔔 Broadcast</div>
    <div class="side-item" data-tab="settings">⚙️ Settings</div>
    <div style="margin-top:40px;padding-top:20px;border-top:1px solid #252525">
      <div class="side-item" id="logout-btn">🚪 Sign Out</div>
    </div>
  </div>
  <div class="main">
    <div class="top-bar">
      <div class="page-title" id="main-title">Dashboard</div>
      <div class="flex"><span style="font-size:11px;color:#666" id="admin-email-display"></span></div>
    </div>
    <div id="tab-content"></div>
  </div>
</div>

<div id="toast-container" class="toast-fixed"></div>

<script>
const toast = (msg, type='info') => {
  const div = document.createElement('div');
  div.className = 'toast';
  div.innerHTML = msg;
  div.style.borderLeftColor = type==='err'?'#ff3b3b':type==='warn'?'#ffa300':'#c8ff00';
  document.getElementById('toast-container').appendChild(div);
  setTimeout(()=>div.remove(), 3500);
};

let currentTab = 'dashboard';
let products = [], orders = [], customers = [], stats = {};

const db = window._admin.db;
const storage = window._admin.storage;
const auth = window._admin.auth;

async function initAdmin() {
  document.getElementById('admin-app').style.display = 'flex';
  document.getElementById('admin-email-display').innerHTML = window.ADMIN_USER?.email || 'admin';
  document.querySelectorAll('.side-item[data-tab]').forEach(el => {
    el.onclick = () => switchTab(el.getAttribute('data-tab'));
  });
  document.getElementById('logout-btn').onclick = async () => {
    await window._admin.signOut(auth);
    location.reload();
  };
  await loadRealTimeData();
  switchTab('dashboard');
}

async function loadRealTimeData() {
  // Products
  window._admin.onSnapshot(window._admin.collection(db, 'products'), (snap) => {
    products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentTab === 'products') renderProducts();
    updateStats();
  });
  // Orders
  window._admin.onSnapshot(window._admin.query(window._admin.collection(db, 'orders'), window._admin.orderBy('createdAt', 'desc')), (snap) => {
    orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentTab === 'orders') renderOrders();
    if (currentTab === 'dashboard') renderDashboard();
    updateStats();
  });
  // Customers (users with role customer)
  window._admin.onSnapshot(window._admin.query(window._admin.collection(db, 'users'), window._admin.where('role', '==', 'customer')), (snap) => {
    customers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentTab === 'customers') renderCustomers();
    updateStats();
  });
}

function updateStats() {
  const totalSales = orders.reduce((sum, o) => sum + (o.total || 0), 0);
  const pendingOrders = orders.filter(o => o.status === 'processing').length;
  const lowStock = products.filter(p => (p.stock || 0) < 10 && (p.stock || 0) > 0).length;
  stats = { totalOrders: orders.length, totalSales, pendingOrders, lowStock, productsCount: products.length };
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.side-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.side-item[data-tab="${tab}"]`).classList.add('active');
  const titleMap = { dashboard:'Dashboard', products:'Product Management', orders:'Order Management', customers:'Customer Directory', notifications:'Broadcast Message', settings:'Store Settings' };
  document.getElementById('main-title').innerHTML = titleMap[tab] || tab;
  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'products') renderProducts();
  else if (tab === 'orders') renderOrders();
  else if (tab === 'customers') renderCustomers();
  else if (tab === 'notifications') renderNotifications();
  else if (tab === 'settings') renderSettings();
}

function renderDashboard() {
  const html = `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-value">${stats.totalOrders || 0}</div><div class="kpi-label">Total Orders</div></div>
      <div class="kpi-card"><div class="kpi-value">₦${(stats.totalSales || 0).toLocaleString()}</div><div class="kpi-label">Revenue</div></div>
      <div class="kpi-card"><div class="kpi-value">${stats.pendingOrders || 0}</div><div class="kpi-label">Pending Orders</div></div>
      <div class="kpi-card"><div class="kpi-value">${stats.lowStock || 0}</div><div class="kpi-label">Low Stock Items</div></div>
    </div>
    <div class="card"><div class="card-header"><span class="card-title">Recent Orders</span><button class="btn btn-outline" onclick="switchTab('orders')">Manage →</button></div>
    <div class="table-responsive"><table class="admin-table"><thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead><tbody>
      ${orders.slice(0,5).map(o => `<tr><td style="color:#c8ff00;font-family:monospace">${o.orderId || o.id.slice(-6)}</td><td>${o.customer || '—'}</td><td>₦${(o.total || 0).toLocaleString()}</td><td><span class="status status-${o.status}">${o.status}</span></td><td style="color:#666">${new Date(o.createdAt?.toDate?.() || Date.now()).toLocaleDateString()}</td></tr>`).join('')}
      ${orders.length === 0 ? '<tr><td colspan="5" style="text-align:center;padding:40px">No orders yet</td></tr>' : ''}
    </tbody></table></div></div>
    <div class="card"><div class="card-header"><span class="card-title">Low Stock Alert</span></div><div class="table-responsive"><table class="admin-table"><thead><tr><th>Product</th><th>Stock</th><th>Action</th></tr></thead><tbody>
      ${products.filter(p => p.stock < 10 && p.stock > 0).map(p => `<tr><td>${p.name}</td><td style="color:#ffa300">${p.stock} left</td><td><button class="btn btn-outline" style="padding:4px 12px;font-size:10px" onclick="openProductModal('${p.id}')">Edit Stock</button></td></tr>`).join('')}
      ${products.filter(p => p.stock < 10 && p.stock > 0).length === 0 ? '<tr><td colspan="3" style="text-align:center;padding:32px">All stock levels are healthy ✓</td></tr>' : ''}
    </tbody></table></div></div>
  `;
  document.getElementById('tab-content').innerHTML = html;
}

// PRODUCTS
function renderProducts() {
  const html = `
    <div style="margin-bottom:20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <button class="btn btn-lime" onclick="openProductModal()">+ Add New Product</button>
      <div class="flex"><input type="text" id="prod-search" placeholder="Search products..." style="width:220px" onkeyup="filterProducts()"/></div>
    </div>
    <div class="card"><div class="table-responsive"><table class="admin-table" id="products-table"><thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Category</th><th>Status</th><th style="width:100px">Actions</th></tr></thead><tbody id="products-tbody"></tbody></table></div></div>
  `;
  document.getElementById('tab-content').innerHTML = html;
  filterProducts();
}

function filterProducts() {
  const search = (document.getElementById('prod-search')?.value || '').toLowerCase();
  const filtered = products.filter(p => p.name?.toLowerCase().includes(search) || (p.category || '').includes(search));
  const tbody = document.getElementById('products-tbody');
  if (tbody) tbody.innerHTML = filtered.map(p => `
    <tr>
      <td><div style="width:36px;height:36px;background:#1a1a1a;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px">${p.emoji || '👕'}</div></td>
      <td style="font-weight:500">${p.name || 'Untitled'}</td>
      <td>₦${(p.price || 0).toLocaleString()}</td>
      <td style="color:${(p.stock || 0) < 5 ? '#ff3b3b' : '#c8ff00'}">${p.stock ?? '—'}</td>
      <td><span class="badge bg-graph">${p.category || 'general'}</span></td>
      <td>${p.disabled ? '<span class="badge bg-red">Disabled</span>' : '<span class="badge bg-lime">Active</span>'}</td>
      <td><div class="flex" style="gap:6px"><button class="btn btn-outline" style="padding:5px 9px;font-size:10px" onclick="openProductModal('${p.id}')">Edit</button><button class="btn btn-red" style="padding:5px 9px;font-size:10px" onclick="deleteProduct('${p.id}')">Del</button></div></td>
    </tr>
  `).join('') || '<tr><td colspan="7" style="text-align:center;padding:48px">No products found</td></tr>';
}

async function openProductModal(productId = null) {
  const product = productId ? products.find(p => p.id === productId) : null;
  const modalHtml = `
    <div id="product-modal" class="modal-overlay" style="display:flex">
      <div class="modal-content" style="max-width:600px">
        <div class="modal-header"><span style="font-weight:700">${product ? 'Edit Product' : 'Create Product'}</span><button class="btn btn-ghost" onclick="closeModal()">✕</button></div>
        <div class="modal-body">
          <div class="grid-2">
            <input type="text" id="prod-name" placeholder="Product name" value="${product?.name || ''}">
            <input type="text" id="prod-category" placeholder="Category (clothes/shoes/accessories)" value="${product?.category || ''}">
            <input type="number" id="prod-price" placeholder="Price (₦)" value="${product?.price || ''}">
            <input type="number" id="prod-stock" placeholder="Stock quantity" value="${product?.stock || 0}">
          </div>
          <textarea id="prod-desc" placeholder="Description" rows="2" class="w-100 mt-3">${product?.description || ''}</textarea>
          <input type="text" id="prod-sizes" placeholder="Sizes (comma: S,M,L,XL)" class="w-100 mt-3" value="${product?.sizes?.join(',') || ''}">
          <input type="text" id="prod-colors" placeholder="Colors (comma: Black,White,Lime)" class="w-100 mt-3" value="${product?.colors?.join(',') || ''}">
          <input type="text" id="prod-tags" placeholder="Tags (comma: new,sale,limited)" class="w-100 mt-3" value="${product?.tags?.join(',') || ''}">
          <div class="flex mt-3"><label><input type="checkbox" id="prod-disabled" ${product?.disabled ? 'checked' : ''}> Disabled (hidden from store)</label></div>
          <div class="flex mt-3"><div class="btn btn-outline" onclick="triggerImageUpload()">Upload Image</div><span id="img-status" style="font-size:10px;color:#666">${product?.imageUrl ? 'Image uploaded' : 'No image'}</span></div>
          <input type="file" id="image-file" accept="image/*" style="display:none" onchange="uploadProductImage()">
          <button class="btn btn-lime w-100 mt-3" onclick="saveProduct('${product?.id || ''}')">Save Product</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  window.productTempId = product?.id || null;
}

function triggerImageUpload() { document.getElementById('image-file').click(); }
let pendingImageFile = null;
async function uploadProductImage() {
  const file = document.getElementById('image-file').files[0];
  if (!file) return;
  pendingImageFile = file;
  document.getElementById('img-status').innerHTML = 'Uploading...';
  const storageRef = window._admin.ref(storage, `products/${Date.now()}_${file.name}`);
  await window._admin.uploadBytes(storageRef, file);
  const url = await window._admin.getDownloadURL(storageRef);
  window.productImageUrl = url;
  document.getElementById('img-status').innerHTML = '✓ Image ready';
  toast('Image uploaded');
}
async function saveProduct(id) {
  const name = document.getElementById('prod-name')?.value.trim();
  if (!name) { toast('Product name required', 'err'); return; }
  const data = {
    name, category: document.getElementById('prod-category')?.value || 'general',
    price: Number(document.getElementById('prod-price')?.value) || 0,
    stock: Number(document.getElementById('prod-stock')?.value) || 0,
    description: document.getElementById('prod-desc')?.value || '',
    sizes: document.getElementById('prod-sizes')?.value.split(',').map(s=>s.trim()).filter(Boolean) || [],
    colors: document.getElementById('prod-colors')?.value.split(',').map(c=>c.trim()).filter(Boolean) || [],
    tags: document.getElementById('prod-tags')?.value.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean) || [],
    disabled: document.getElementById('prod-disabled')?.checked || false,
    updatedAt: window._admin.serverTimestamp(),
  };
  if (window.productImageUrl) data.imageUrl = window.productImageUrl;
  if (id) {
    await window._admin.updateDoc(window._admin.doc(db, 'products', id), data);
    toast('Product updated');
  } else {
    data.createdAt = window._admin.serverTimestamp();
    data.emoji = '👕';
    await window._admin.addDoc(window._admin.collection(db, 'products'), data);
    toast('Product created');
  }
  closeModal();
}
async function deleteProduct(id) {
  if (!confirm('Delete this product permanently?')) return;
  await window._admin.deleteDoc(window._admin.doc(db, 'products', id));
  toast('Deleted');
}

// ORDERS
function renderOrders() {
  const html = `<div class="card"><div class="card-header"><span class="card-title">All Orders</span><select id="order-filter" onchange="renderOrders()" style="width:140px"><option value="">All Status</option><option value="processing">Processing</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option><option value="cancelled">Cancelled</option></select></div>
  <div class="table-responsive"><table class="admin-table"><thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Actions</th></tr></thead><tbody id="orders-tbody"></tbody></table></div></div>`;
  document.getElementById('tab-content').innerHTML = html;
  const filter = document.getElementById('order-filter')?.value || '';
  const filtered = filter ? orders.filter(o => o.status === filter) : orders;
  const tbody = document.getElementById('orders-tbody');
  tbody.innerHTML = filtered.map(o => `
    <tr><td style="color:#c8ff00;font-family:monospace">${o.orderId || o.id.slice(-6)}</td><td>${o.customer || o.email || '—'}</td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(o.items || []).map(i=>i.name).join(', ') || '-'}</td><td>₦${(o.total || 0).toLocaleString()}</td><td>${o.payment || '—'}</td><td><select class="status-select" data-id="${o.id}" onchange="updateOrderStatus('${o.id}', this.value)"><option ${o.status==='processing'?'selected':''}>processing</option><option ${o.status==='shipped'?'selected':''}>shipped</option><option ${o.status==='delivered'?'selected':''}>delivered</option><option ${o.status==='cancelled'?'selected':''}>cancelled</option></select></td>
    <td><button class="btn btn-outline" style="padding:4px 10px" onclick="viewOrderDetail('${o.id}')">View</button></td></tr>
  `).join('') || '<tr><td colspan="7" style="text-align:center;padding:48px">No orders</td></tr>';
}
async function updateOrderStatus(orderId, status) {
  await window._admin.updateDoc(window._admin.doc(db, 'orders', orderId), { status, updatedAt: window._admin.serverTimestamp() });
  toast(`Order status → ${status}`);
  if (status === 'shipped') {
    await window._admin.addDoc(window._admin.collection(db, 'notifications'), { uid: (orders.find(o=>o.id===orderId)?.uid) || '', type: 'order', read: false, msg: `Your order #${orderId.slice(-6)} has been shipped!`, createdAt: window._admin.serverTimestamp() });
  }
}
function viewOrderDetail(orderId) { alert('Full order view would show items & address. Check Firestore console for now.'); }

// CUSTOMERS
function renderCustomers() {
  const html = `<div class="card"><div class="card-header"><span class="card-title">Customer Accounts</span></div><div class="table-responsive"><table class="admin-table"><thead><tr><th>Name</th><th>Email</th><th>Joined</th><th>Reward Points</th><th>Actions</th></tr></thead><tbody id="customers-tbody"></tbody></table></div></div>`;
  document.getElementById('tab-content').innerHTML = html;
  const tbody = document.getElementById('customers-tbody');
  tbody.innerHTML = customers.map(c => `<tr><td>${c.firstName || ''} ${c.lastName || ''}</td><td>${c.email}</td><td style="color:#666">${c.createdAt?.toDate?.().toLocaleDateString() || '—'}</td><td>${c.rewardPoints || 0}</td><td><button class="btn btn-outline" style="padding:4px 12px" onclick="toggleSuspend('${c.id}','${c.suspended}')">${c.suspended ? 'Unsuspend' : 'Suspend'}</button></td></tr>`).join('') || '<tr><td colspan="5" style="text-align:center;padding:48px">No customers found</td></tr>';
}
async function toggleSuspend(uid, current) {
  const newStatus = !(current === 'true' || current === true);
  await window._admin.updateDoc(window._admin.doc(db, 'users', uid), { suspended: newStatus });
  toast(newStatus ? 'Account suspended' : 'Account reactivated');
}

// BROADCAST
function renderNotifications() {
  const html = `
    <div class="card"><div class="card-header"><span class="card-title">Send Broadcast Message</span></div><div class="p-3">
      <textarea id="broadcast-msg" placeholder="Message to all customers..." rows="3" style="width:100%;margin-bottom:12px"></textarea>
      <div class="flex"><button class="btn btn-lime" onclick="sendBroadcast()">Send to All Customers</button></div>
    </div></div>
  `;
  document.getElementById('tab-content').innerHTML = html;
}
async function sendBroadcast() {
  const msg = document.getElementById('broadcast-msg')?.value.trim();
  if (!msg) { toast('Enter a message', 'err'); return; }
  for (const cust of customers) {
    await window._admin.addDoc(window._admin.collection(db, 'notifications'), { uid: cust.id, type: 'broadcast', read: false, msg, createdAt: window._admin.serverTimestamp() });
  }
  toast(`Broadcast sent to ${customers.length} customers`);
  document.getElementById('broadcast-msg').value = '';
}

// SETTINGS
async function renderSettings() {
  const snap = await window._admin.getDoc(window._admin.doc(db, 'settings', 'store'));
  const s = snap.exists() ? snap.data() : {};
  const html = `
    <div class="card"><div class="card-header"><span class="card-title">Store Configuration</span></div><div class="p-3">
      <div class="grid-2">
        <div><label style="color:#666">Shipping Fee (₦)</label><input id="set-ship" type="number" value="${s.shippingFee || 2500}" class="w-100"></div>
        <div><label style="color:#666">Free Shipping Threshold (₦)</label><input id="set-free" type="number" value="${s.freeShippingThreshold || 50000}" class="w-100"></div>
        <div><label style="color:#666">Banner Text</label><input id="set-banner" value="${s.bannerText || 'FREE DELIVERY ON ORDERS OVER ₦50,000'}" class="w-100"></div>
        <div><label style="color:#666">Emergency Contact</label><input id="set-emergency" value="${s.emergencyContact || '+234 800 AKTIVITY'}" class="w-100"></div>
      </div>
      <div class="mt-3"><label style="color:#666">Ticker Items (comma separated)</label><textarea id="set-ticker" rows="2" style="width:100%">${(s.tickerItems || []).join(',')}</textarea></div>
      <button class="btn btn-lime mt-3" onclick="saveSettings()">Save Settings</button>
    </div></div>
  `;
  document.getElementById('tab-content').innerHTML = html;
}
async function saveSettings() {
  const data = {
    shippingFee: Number(document.getElementById('set-ship')?.value) || 0,
    freeShippingThreshold: Number(document.getElementById('set-free')?.value) || 0,
    bannerText: document.getElementById('set-banner')?.value || '',
    emergencyContact: document.getElementById('set-emergency')?.value || '',
    tickerItems: document.getElementById('set-ticker')?.value.split(',').map(s=>s.trim()) || [],
    updatedAt: window._admin.serverTimestamp(),
  };
  await window._admin.setDoc(window._admin.doc(db, 'settings', 'store'), data, { merge: true });
  toast('Settings updated');
}

function closeModal() { document.querySelector('.modal-overlay')?.remove(); }
